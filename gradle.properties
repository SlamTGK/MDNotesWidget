# Enables AndroidX support (required for all modern AndroidX/Material dependencies)
android.useAndroidX=true

# Suppress warning about compileSdk 36 not being officially tested with AGP 8.9.0
android.suppressUnsupportedCompileSdk=36

# Use Kotlin script DSL syntax for build files
kotlin.code.style=official

# Enable R8 full mode for smaller APKs in release builds
android.enableR8.fullMode=true

# Increase JVM heap for large builds in CI
org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC

# Disable configuration cache to prevent stale config from previous runs
org.gradle.configuration-cache=false

# Enable parallel project execution
org.gradle.parallel=true
