name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle ──────────────────────────────────────────────────────────────
      # Uses setup-gradle to install Gradle 8.11 without needing a pre-built wrapper JAR
      - name: Setup Gradle 8.11
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      # ── Android SDK ─────────────────────────────────────────────────────────
      # ubuntu-latest already has Android SDK; install API 36 build tools if missing
      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            --sdk_root=$ANDROID_HOME || true

      # ── Cache ───────────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: gradle-

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-configuration-cache

      - name: Build Release APK (signed with debug key)
        run: gradle assembleRelease --stacktrace --no-configuration-cache

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MDNotesWidget-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MDNotesWidget-release
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      # ── Optional: Create GitHub Release on tag push ─────────────────────────
      - name: Create Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
