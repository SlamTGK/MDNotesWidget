name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK ─────────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

      # ── Gradle ──────────────────────────────────────────────────────────────
      # Uses setup-gradle to install Gradle without needing a wrapper JAR in the repo
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      # ── Cache ───────────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Generate debug keystore ─────────────────────────────────────────────
      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair \
            -keystore $HOME/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-configuration-cache

      - name: Build Release APK
        run: gradle assembleRelease --stacktrace --no-configuration-cache

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MDNotesWidget-v2.1-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MDNotesWidget-v2.1-release
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      # ── Create GitHub Release on tag push ───────────────────────────────────
      - name: Create Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "MD Notes Widget ${{ github.ref_name }}"
          body: |
            ## MD Notes Widget ${{ github.ref_name }}

            ### Download
            - **app-release.apk** — Release build (minified, signed with debug key)
            - **app-debug.apk** — Debug build

            ### What's New in v2.0
            - Full-screen note viewer with swipe navigation
            - Pin notes to widget
            - List widget (StackView) with swipeable cards
            - Material You / Monet dynamic colors
            - Custom widget colors
            - Quiet hours
            - Multiple tags with AND/OR logic
            - Note history (last 50 notes)
            - Russian + English localization
            - Built-in note viewer
            - Performance optimizations & bug fixes
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
